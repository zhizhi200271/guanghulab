# 用途: Awen仓库用，每30分钟检查所有网文行业服务器健康状态
# 注意: 此文件是模板，需要复制到 Awen 的仓库 .github/workflows/ 下
# ============================================================

name: '🏥 全体健康检查 · Health Check All'

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: '检查目标 (all/feimao/juzi/yeye/awen)'
        required: false
        default: 'all'

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: '📋 检出代码'
        uses: actions/checkout@v4

      - name: '🔑 配置SSH密钥'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 配置所有可用的服务器密钥
          for PREFIX in FEIMAO JUZI YEYE AWEN; do
            KEY_VAR="${PREFIX}_SERVER_KEY"
            HOST_VAR="${PREFIX}_SERVER_HOST"
            eval KEY_VAL="\${{ secrets.${KEY_VAR} }}"
            eval HOST_VAL="\${{ secrets.${HOST_VAR} }}"
            if [ -n "$KEY_VAL" ]; then
              echo "$KEY_VAL" > ~/.ssh/${PREFIX,,}_key
              chmod 600 ~/.ssh/${PREFIX,,}_key
            fi
            if [ -n "$HOST_VAL" ]; then
              ssh-keyscan -H "$HOST_VAL" >> ~/.ssh/known_hosts 2>/dev/null || true
            fi
          done

      - name: '🔍 检查所有服务器'
        run: |
          echo "═══ 网文行业全体健康检查 ═══"
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          check_server() {
            local NAME=$1 KEY_FILE=$2 HOST=$3 USER=$4 PORT=${5:-22}
            echo "--- ${NAME} ---"
            if [ -z "$HOST" ] || [ ! -f "$KEY_FILE" ]; then
              echo "⏳ 未配置"
              return
            fi
            ssh -i "$KEY_FILE" -p "$PORT" -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
              "${USER}@${HOST}" \
              "echo '✅ 在线'; uptime -p; pm2 list 2>/dev/null || echo 'PM2未安装'" \
              2>/dev/null || echo "❌ 不可达"
            echo ""
          }

          check_server "肥猫 (ZY-SVR-003)" ~/.ssh/feimao_key \
            "${{ secrets.FEIMAO_SERVER_HOST }}" "${{ secrets.FEIMAO_SERVER_USER }}" "${{ secrets.FEIMAO_SSH_PORT }}"

          check_server "桔子" ~/.ssh/juzi_key \
            "${{ secrets.JUZI_SERVER_HOST }}" "${{ secrets.JUZI_SERVER_USER }}" "${{ secrets.JUZI_SSH_PORT }}"

          check_server "页页" ~/.ssh/yeye_key \
            "${{ secrets.YEYE_SERVER_HOST }}" "${{ secrets.YEYE_SERVER_USER }}" "${{ secrets.YEYE_SSH_PORT }}"

          check_server "Awen" ~/.ssh/awen_key \
            "${{ secrets.AWEN_SERVER_HOST }}" "${{ secrets.AWEN_SERVER_USER }}" "${{ secrets.AWEN_SSH_PORT }}"

          echo "═══ 检查完成 ═══"
