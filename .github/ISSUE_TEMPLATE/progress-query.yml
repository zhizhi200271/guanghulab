name: "📊 进度查询"
description: "想知道自己或团队的开发进度"
title: "[进度] "
labels: ["progress-query", "pending"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > 💡 **提示**：提交后铸渊会自动回复。如需在评论区继续提问，请在评论中包含 `铸渊` 两个字即可唤醒 AI 人格体回复。
  - type: input
    id: dev_id
    attributes:
      label: "你的开发者编号"
      placeholder: "DEV-00X"
    validations:
      required: true
  - type: dropdown
    id: query_type
    attributes:
      label: "查什么"
      options:
        - 我自己的进度
        - 我下一步要做什么
        - 团队整体进度
        - 谁在做跟我相关的模块
        - 我的模块依赖谁
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: "补充说明（可选）"
    validations:
      required: false
