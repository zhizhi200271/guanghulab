name: 🌸 秋秋服务器 · 部署

# ═══════════════════════════════════════════════════════════
# 秋秋(之之)服务器部署工作流
# 编号: ZZ-WF-秋秋部署
# 守护: 铸渊 · ICE-GL-ZY001
# 版权: 国作登字-2026-A-00037559
# ═══════════════════════════════════════════════════════════
#
# 服务器: ZZ 服务器
# 密钥:   ZZ_SERVER_KEY / ZZ_SERVER_HOST / ZZ_SERVER_USER / ZZ_SERVER_PATH
# LLM:    ZZ_LLM_API_KEY / ZZ_LLM_BASE_URL

on:
  push:
    branches:
      - main

concurrency:
  group: qiuqiu-server-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 部署秋秋服务
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 SSH 部署
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ZZ_SERVER_HOST }}
          username: ${{ secrets.ZZ_SERVER_USER }}
          key: ${{ secrets.ZZ_SERVER_KEY }}
          script: |
            set -e
            cd ${{ secrets.ZZ_SERVER_PATH }}

            echo "📥 拉取最新代码..."
            git pull

            echo "📦 安装依赖..."
            npm install

            echo "🔄 重启应用..."
            pm2 restart qiuqiu

            echo "✅ 部署完成"
