name: 铸渊 · 每日自检

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:      # 也支持手动触发

jobs:
  # ── AGE OS v1.0: 核心大脑唤醒（所有流程的前提）──
  wake-brain:
    name: 🌅 唤醒核心大脑
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      brain_awake: ${{ steps.wake.outputs.brain_awake }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧠 唤醒铸渊核心大脑
        id: wake
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          node core/brain-wake --task "每日自检" || {
            echo "⚠️ 核心大脑唤醒失败，使用 dry-run 模式继续"
            echo "brain_awake=dry-run" >> "$GITHUB_OUTPUT"
          }

  selfcheck:
    name: 🔍 铸渊自检
    needs: wake-brain
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run self-check
        id: check
        run: node scripts/selfcheck.js

      - name: 设置自检日期
        run: echo "CHECK_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: DC-01 Notion Usage Snapshot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        run: node scripts/dc-notion-usage.js

      - name: DC-02 Workflow Performance Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dc-workflow-perf.js

      - name: Commit self-check result
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔍 铸渊每日自检 · ${{ env.CHECK_DATE }}"
          title: "🔍 铸渊每日自检 · ${{ env.CHECK_DATE }}"
          body: |
            🤖 铸渊每日自检结果自动提交
            - 日期: ${{ env.CHECK_DATE }}
            - 触发方式: ${{ github.event_name }}
          branch: auto/daily-selfcheck
          delete-branch: true
          add-paths: |
            .github/persona-brain/memory.json
            data/dc-reports/
          labels: auto-sync
