name: "📰 铸渊 · 光湖开发日报"

on:
  schedule:
    - cron: '0 2 * * *'    # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write
  pull-requests: write
  discussions: write

jobs:
  daily-report:
    name: 生成并发布开发日报
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50   # 获取最近提交用于日报亮点

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 生成并发布日报 ──
      - name: 生成开发日报
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCUSSION_CATEGORY: "Announcements"
        run: node scripts/generate-daily-report.js

      # ── 通过 PR 提交日报存档（兼容 branch protection）──
      - name: 设置日报日期
        run: echo "REPORT_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 提交日报存档
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📰 光湖开发日报 · ${{ env.REPORT_DATE }} [skip ci]"
          title: "📰 光湖开发日报 · ${{ env.REPORT_DATE }}"
          body: |
            🤖 铸渊自动生成并存档开发日报
            - 日期: ${{ env.REPORT_DATE }}
            - 触发方式: ${{ github.event_name }}
          branch: auto/daily-report
          delete-branch: true
          add-paths: |
            docs/daily-reports/
          labels: auto-sync
